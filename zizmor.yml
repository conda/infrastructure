# zizmor configuration file
# https://docs.zizmor.sh/configuration/

rules:
  dangerous-triggers:
    ignore:
      # cla.yml uses pull_request_target but the workflow only
      # invokes conda/actions/check-cla which does not check out
      # untrusted PR code. The trigger is required to react to
      # new PRs for CLA verification.
      - cla.yml

      # project.yml uses pull_request_target but does not check
      # out any code; it only adds PRs to a GitHub project board.
      - project.yml

  secrets-outside-env:
    ignore:
      # These workflows use repository/org secrets for cross-repo bot
      # automation. Requiring deployment environments would change the
      # automation model and is intentionally tracked as a policy decision
      # outside this audit-hardening pass.
      - cla.yml
      - init.yml
      - issues.yml
      - project.yml
      - stale.yml
      - update.yml

  superfluous-actions:
    ignore:
      # These helper actions are pinned and currently provide workflow
      # behavior that would need dedicated migration PRs before replacing
      # them with inline GitHub CLI commands.
      - init.yml
      - issues.yml
      - update.yml

  template-injection:
    ignore:
      # stale.yml uses join(steps.stale.outputs.*, ',') in a run
      # block to echo stale action outputs. These outputs are not
      # attacker-controlled (they come from the stale action itself).
      # Low confidence finding.
      - stale.yml
